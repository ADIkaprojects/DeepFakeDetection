pipeline:
  fps_target: 10
  resolution: [640, 480]
  alpha_initial: 0.12
  alpha_max: 0.30
  alpha_min: 0.08
  alpha_decay_rate: 0.02
  feedback_interval_frames: 5
  feedback_confidence_threshold: 0.70
  transport_mode: http

detection:
  backend: mediapipe
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.4

perturbation:
  atn_input_size: 224
  device: cpu
  model_key: reface_atn

feedback:
  enabled: true
  use_ufd_backend: false  # false keeps lightweight runtime backend; true uses heavier UFD backend for closer notebook parity
  model_key: deepsafe
  input_size: 224
  high_threshold: 0.70
  low_threshold: 0.40
  increase_step: 0.02

nsfw_trigger:
  enabled: true
  alpha: 0.05
  device: cpu
  proxies:
    - falconsai
  protection_profile: shield_and_nsfw

ci:
  counts_as_production_evidence: false
  gate_label: smoke

transport:
  mode: http
  host: 127.0.0.1
  http_port: 18080
  auth:
    api_key: afs-local-dev-key
  rate_limit:
    enabled: true
    requests_per_window: 1000
    window_seconds: 60

logging:
  level: INFO
  output: logs/afs-smoke.jsonl
  metrics_port: 9090

models:
  registry_path: models/registry.json
  strict_startup: false
  allow_identity_fallback: true
  nsfw_trigger_atn:
    path: models/nsfw_trigger_atn.pth
