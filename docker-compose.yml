version: "3.9"
services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  capture-client:
    build:
      context: .
      dockerfile: Dockerfile.client
    depends_on:
      mcp-server:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
